
version: '3.8'

services:
    
    backend:

        build: ./backend
        
        container_name: backend
        
        restart: unless-stopped
        
        ports:
            - "5000:5000"

    frontend:

        build: ./frontend
        
        container_name: frontend
        
        restart: unless-stopped
        
        ports:
            - "8080:80"
        
        depends_on:
            - backend
